openapi: 3.0.3
info:
  title: 自动化测试管理平台 API
  description: |
    面向服务器 POC 团队的一站式性能测试平台 API 文档。
    
    ## 功能模块
    - 服务器管理：服务器信息录入、分组、状态监控
    - 脚本中心：测试脚本上传、版本管理、参数配置、输出解析
    - 测试任务：任务创建、调度、执行、监控
    - 测试结果：结果解析、判定、对比、趋势分析
    - 报告中心：报告生成、查看、导出
    
    ## 认证方式
    当前版本暂无用户认证，后续版本将支持 Token 认证。
    
  version: 1.0.2
  contact:
    name: API Support
    email: support@example.com
  
servers:
  - url: http://localhost:8080/api/v1
    description: 开发环境
  - url: http://test.example.com/api/v1
    description: 测试环境
  - url: http://prod.example.com/api/v1
    description: 生产环境

tags:
  - name: servers
    description: 服务器管理
  - name: server-groups
    description: 服务器分组管理
  - name: scripts
    description: 脚本管理
  - name: tasks
    description: 任务管理
  - name: metrics
    description: 指标数据
  - name: reports
    description: 报告管理
  - name: results
    description: 测试结果管理
  - name: metric-definitions
    description: 指标定义管理
  - name: result-rules
    description: 结果判定规则管理
  - name: system
    description: 系统配置

paths:
  # ============================================================
  # 服务器分组管理
  # ============================================================
  /server-groups:
    get:
      tags:
        - server-groups
      summary: 获取分组列表
      operationId: listServerGroups
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ServerGroup'
    
    post:
      tags:
        - server-groups
      summary: 创建分组
      operationId: createServerGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServerGroupCreate'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    $ref: '#/components/schemas/ServerGroup'

  /server-groups/{id}:
    put:
      tags:
        - server-groups
      summary: 更新分组
      operationId: updateServerGroup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServerGroupCreate'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    
    delete:
      tags:
        - server-groups
      summary: 删除分组
      operationId: deleteServerGroup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  # ============================================================
  # 服务器管理
  # ============================================================
  /servers:
    get:
      tags:
        - servers
      summary: 获取服务器列表
      operationId: listServers
      parameters:
        - name: name
          in: query
          description: 服务器名称（模糊搜索）
          schema:
            type: string
        - name: status
          in: query
          description: 状态筛选
          schema:
            type: string
            enum: [online, offline, maintenance]
        - name: group_id
          in: query
          description: 分组ID
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          description: 页码
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          description: 每页数量
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      total:
                        type: integer
                      page:
                        type: integer
                      size:
                        type: integer
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/Server'
    
    post:
      tags:
        - servers
      summary: 添加服务器
      operationId: createServer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServerCreate'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    $ref: '#/components/schemas/Server'

  /servers/{id}:
    get:
      tags:
        - servers
      summary: 获取服务器详情
      operationId: getServer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    $ref: '#/components/schemas/Server'
    
    put:
      tags:
        - servers
      summary: 更新服务器
      operationId: updateServer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServerCreate'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    
    delete:
      tags:
        - servers
      summary: 删除服务器
      operationId: deleteServer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /servers/{id}/test:
    post:
      tags:
        - servers
      summary: 测试连接
      operationId: testServerConnection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: 连接成功
                  data:
                    type: object
                    properties:
                      connected:
                        type: boolean
                      latency:
                        type: integer
                        description: 连接延迟(ms)

  /servers/{id}/status:
    get:
      tags:
        - servers
      summary: 获取服务器状态
      operationId: getServerStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [online, offline, maintenance]
                      lastCheckAt:
                        type: string
                        format: date-time
                      cpuUsage:
                        type: number
                      memoryUsage:
                        type: number

  /servers/{id}/refresh:
    post:
      tags:
        - servers
      summary: 刷新服务器信息
      description: 自动识别CPU、内存、磁盘、操作系统等信息
      operationId: refreshServerInfo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    $ref: '#/components/schemas/Server'

  /servers/import:
    post:
      tags:
        - servers
      summary: 批量导入服务器
      operationId: importServers
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV文件
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      total:
                        type: integer
                        description: 总数
                      success:
                        type: integer
                        description: 成功数
                      failed:
                        type: integer
                        description: 失败数
                      errors:
                        type: array
                        items:
                          type: string

  # ============================================================
  # 脚本管理
  # ============================================================
  /scripts:
    get:
      tags:
        - scripts
      summary: 获取脚本列表
      operationId: listScripts
      parameters:
        - name: name
          in: query
          description: 脚本名称（模糊搜索）
          schema:
            type: string
        - name: test_category
          in: query
          description: 测试类型
          schema:
            type: string
        - name: status
          in: query
          description: 状态
          schema:
            type: string
            enum: [enabled, disabled]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      total:
                        type: integer
                      page:
                        type: integer
                      size:
                        type: integer
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/Script'
    
    post:
      tags:
        - scripts
      summary: 上传脚本
      operationId: createScript
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
                - script_type
                - test_category
                - file
              properties:
                name:
                  type: string
                  description: 脚本名称
                script_type:
                  type: string
                  enum: [shell, python]
                  description: 脚本类型
                test_category:
                  type: string
                  description: 测试类型
                description:
                  type: string
                  description: 描述
                file:
                  type: string
                  format: binary
                  description: 脚本文件(.sh/.py/.zip/.tar.gz)
                entry_file:
                  type: string
                  description: 入口文件路径（多文件时必填）
                lifecycle_mode:
                  type: string
                  enum: [simple, full]
                  default: simple
                  description: 生命周期模式
                has_deploy:
                  type: boolean
                  default: false
                  description: 是否包含部署阶段
                has_cleanup:
                  type: boolean
                  default: false
                  description: 是否包含卸载阶段
                deploy_entry:
                  type: string
                  description: 部署入口文件
                cleanup_entry:
                  type: string
                  description: 卸载入口文件
                parameters:
                  type: string
                  description: 参数定义JSON字符串
                parse_rules:
                  type: string
                  description: 解析规则JSON字符串
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    $ref: '#/components/schemas/Script'

  /scripts/{id}:
    get:
      tags:
        - scripts
      summary: 获取脚本详情
      operationId: getScript
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    $ref: '#/components/schemas/Script'
    
    put:
      tags:
        - scripts
      summary: 更新脚本
      operationId: updateScript
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScriptUpdate'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    
    delete:
      tags:
        - scripts
      summary: 删除脚本
      operationId: deleteScript
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /scripts/{id}/versions:
    get:
      tags:
        - scripts
      summary: 获取版本列表
      operationId: listScriptVersions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      total:
                        type: integer
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/ScriptVersion'
    
    post:
      tags:
        - scripts
      summary: 创建新版本
      operationId: createScriptVersion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                entry_file:
                  type: string
                change_log:
                  type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    $ref: '#/components/schemas/ScriptVersion'

  /scripts/{id}/versions/{version}:
    get:
      tags:
        - scripts
      summary: 获取指定版本
      operationId: getScriptVersion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: version
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    $ref: '#/components/schemas/ScriptVersion'

  /scripts/{id}/rollback/{version}:
    post:
      tags:
        - scripts
      summary: 回退版本
      operationId: rollbackScriptVersion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: version
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /scripts/{id}/files:
    get:
      tags:
        - scripts
      summary: 获取脚本文件列表
      operationId: listScriptFiles
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: version
          in: query
          description: 版本号（可选，默认当前版本）
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        path:
                          type: string
                        size:
                          type: integer
                        type:
                          type: string
                        isEntry:
                          type: boolean

  /scripts/{id}/files/{path}:
    get:
      tags:
        - scripts
      summary: 获取文件内容
      operationId: getScriptFileContent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: path
          in: path
          required: true
          description: 文件路径
          schema:
            type: string
        - name: version
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      path:
                        type: string
                      content:
                        type: string
                      size:
                        type: integer

  /scripts/{id}/export:
    get:
      tags:
        - scripts
      summary: 导出脚本
      operationId: exportScript
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: version
          in: query
          schema:
            type: string
        - name: format
          in: query
          schema:
            type: string
            enum: [zip, tar.gz]
            default: zip
        - name: include_config
          in: query
          description: 是否包含配置文件
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: 成功
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /scripts/categories:
    get:
      tags:
        - scripts
      summary: 获取测试类型列表
      operationId: listScriptCategories
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      type: string

  /scripts/{id}/validate:
    post:
      tags:
        - scripts
      summary: 校验脚本
      operationId: validateScript
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      valid:
                        type: boolean
                      errors:
                        type: array
                        items:
                          type: string

  /scripts/parse-upload:
    post:
      tags:
        - scripts
      summary: 解析上传文件
      description: 上传压缩包后解析文件列表，用于预览
      operationId: parseUploadFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      fileCount:
                        type: integer
                      totalSize:
                        type: integer
                      files:
                        type: array
                        items:
                          type: object
                          properties:
                            path:
                              type: string
                            size:
                              type: integer
                            type:
                              type: string
                      suggestedEntry:
                        type: string

  # ============================================================
  # 任务管理
  # ============================================================
  /tasks:
    get:
      tags:
        - tasks
      summary: 获取任务列表
      operationId: listTasks
      parameters:
        - name: name
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, deploying, running, cleaning, completed, cancelled, failed]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      total:
                        type: integer
                      page:
                        type: integer
                      size:
                        type: integer
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/Task'
    
    post:
      tags:
        - tasks
      summary: 创建任务
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreate'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    $ref: '#/components/schemas/Task'

  /tasks/{id}:
    get:
      tags:
        - tasks
      summary: 获取任务详情
      operationId: getTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
