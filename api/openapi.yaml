  /result-rules/{id}/test:
    post:
      tags:
        - result-rules
      summary: 测试规则
      description: 使用已有结果测试判定规则
      operationId: testResultRule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                result_id:
                  type: integer
                  format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      result:
                        type: string
                        enum: [pass, fail, warning, error]
                      overallScore:
                        type: integer
                      matchedConditions:
                        type: array
                        items:
                          type: object
                          properties:
                            metric:
                              type: string
                            value:
                              type: number
                            expected:
                              type: string
                            passed:
                              type: boolean

  # ============================================================
  # 系统配置
  # ============================================================
  /system/config:
    get:
      tags:
        - system
      summary: 获取系统配置
      operationId: getSystemConfig
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                        value:
                          type: string
                        description:
                          type: string
    
    put:
      tags:
        - system
      summary: 更新系统配置
      operationId: updateSystemConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                key:
                  type: string
                value:
                  type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /system/storage:
    get:
      tags:
        - system
      summary: 获取存储信息
      operationId: getStorageInfo
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      scripts:
                        type: object
                        properties:
                          path:
                            type: string
                          used:
                            type: integer
                          total:
                            type: integer
                      reports:
                        type: object
                        properties:
                          path:
                            type: string
                          used:
                            type: integer
                          total:
                            type: integer
                      temp:
                        type: object
                        properties:
                          path:
                            type: string
                          used:
                            type: integer
                          total:
                            type: integer

# ============================================================
# 组件定义
# ============================================================
components:
  schemas:
    # 通用响应
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object

    # 服务器分组
    ServerGroup:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ServerGroupCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string

    # 服务器
    Server:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        host:
          type: string
        port:
          type: integer
          default: 22
        username:
          type: string
        authType:
          type: string
          enum: [password, ssh_key]
        osType:
          type: string
        osVersion:
          type: string
        cpuCores:
          type: integer
        cpuModel:
          type: string
        memorySize:
          type: string
        memoryTotalMb:
          type: integer
        diskInfo:
          type: object
          additionalProperties: true
        groupId:
          type: integer
          format: int64
        groupName:
          type: string
        tags:
          type: array
          items:
            type: string
        remark:
          type: string
        status:
          type: string
          enum: [online, offline, maintenance]
        lastCheckAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ServerCreate:
      type: object
      required:
        - name
        - host
        - port
        - username
        - authType
        - authSecret
      properties:
        name:
          type: string
          maxLength: 100
        host:
          type: string
          maxLength: 255
        port:
          type: integer
          default: 22
        username:
          type: string
          maxLength: 50
        authType:
          type: string
          enum: [password, ssh_key]
        authSecret:
          type: string
          description: 密码或SSH私钥
        groupId:
          type: integer
          format: int64
        tags:
          type: array
          items:
            type: string
        remark:
          type: string

    # 脚本
    Script:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        scriptType:
          type: string
          enum: [shell, python]
        testCategory:
          type: string
        description:
          type: string
        currentVersion:
          type: string
        lifecycleMode:
          type: string
          enum: [simple, full]
        hasDeploy:
          type: boolean
        hasCleanup:
          type: boolean
        deployEntry:
          type: string
        cleanupEntry:
          type: string
        entryFile:
          type: string
        fileList:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              size:
                type: integer
              isEntry:
                type: boolean
        parameters:
          type: object
          additionalProperties: true
        parseRules:
          type: object
          additionalProperties: true
        defaultTimeout:
          type: integer
        defaultRetry:
          type: integer
        isBuiltin:
          type: boolean
        status:
          type: string
          enum: [enabled, disabled]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ScriptUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        parameters:
          type: object
          additionalProperties: true
        parseRules:
          type: object
          additionalProperties: true
        defaultTimeout:
          type: integer
        defaultRetry:
          type: integer
        status:
          type: string
          enum: [enabled, disabled]

    ScriptVersion:
      type: object
      properties:
        id:
          type: integer
          format: int64
        scriptId:
          type: integer
          format: int64
        version:
          type: string
        lifecycleMode:
          type: string
          enum: [simple, full]
        hasDeploy:
          type: boolean
        hasCleanup:
          type: boolean
        deployEntry:
          type: string
        cleanupEntry:
          type: string
        entryFile:
          type: string
        fileList:
          type: array
          items:
            type: object
        storagePath:
          type: string
        totalSize:
          type: integer
          format: int64
        fileCount:
          type: integer
        checksum:
          type: string
        changeLog:
          type: string
        createdAt:
          type: string
          format: date-time

    # 任务
    Task:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        scriptId:
          type: integer
          format: int64
        scriptName:
          type: string
        scriptVersion:
          type: string
        status:
          type: string
          enum: [pending, deploying, running, cleaning, completed, cancelled, failed]
        progress:
          type: integer
          minimum: 0
          maximum: 100
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time

    TaskCreate:
      type: object
      required:
        - name
        - scriptId
        - scriptVersion
        - serverIds
        - runParams
        - executionMode
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
        scriptId:
          type: integer
          format: int64
        scriptVersion:
          type: string
        serverIds:
          type: array
          items:
            type: integer
            format: int64
          minItems: 1
        sharedParams:
          type: object
          additionalProperties: true
        deployParams:
          type: object
          additionalProperties: true
        runParams:
          type: object
          additionalProperties: true
        lifecycleConfig:
          type: object
          properties:
            skipDeploy:
              type: boolean
              default: false
            skipCleanup:
              type: boolean
              default: false
            deployTimeout:
              type: integer
              default: 600
            cleanupTimeout:
              type: integer
              default: 300
        collectEnabled:
          type: boolean
          default: true
        collectConfig:
          type: object
          additionalProperties: true
        executionMode:
          type: string
          enum: [immediate, scheduled]
        scheduledTime:
          type: string
          format: date-time
        parallelMode:
          type: string
          enum: [sequential, parallel]
          default: sequential
        maxParallel:
          type: integer
          default: 1
        failureStrategy:
          type: string
          enum: [continue, stop]
          default: continue

    TaskDetail:
      type: object
      allOf:
        - $ref: '#/components/schemas/Task'
        - type: object
          properties:
            script:
              type: object
              properties:
                id:
                  type: integer
                  format: int64
                name:
                  type: string
                version:
                  type: string
                lifecycleMode:
                  type: string
                hasDeploy:
                  type: boolean
                hasCleanup:
                  type: boolean
            lifecycleConfig:
              type: object
              properties:
                skipDeploy:
                  type: boolean
                skipCleanup:
                  type: boolean
                deployTimeout:
                  type: integer
                cleanupTimeout:
                  type: integer
            lifecycleSummary:
              type: object
              properties:
                deploy:
                  $ref: '#/components/schemas/LifecycleStageSummary'
                run:
                  $ref: '#/components/schemas/LifecycleStageSummary'
                cleanup:
                  $ref: '#/components/schemas/LifecycleStageSummary'
            sharedParams:
              type: object
              additionalProperties: true
            deployParams:
              type: object
              additionalProperties: true
            runParams:
              type: object
              additionalProperties: true
            servers:
              type: array
              items:
                $ref: '#/components/schemas/TaskServerDetail'

    LifecycleStageSummary:
      type: object
      properties:
        status:
          type: string
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        duration:
          type: integer
          description: 耗时(秒)
        successCount:
          type: integer
        failedCount:
          type: integer

    TaskServerDetail:
      type: object
      properties:
        serverId:
          type: integer
          format: int64
        serverName:
          type: string
        overallStatus:
          type: string
        deploy:
          $ref: '#/components/schemas/StageDetail'
        run:
          $ref: '#/components/schemas/StageDetail'
        cleanup:
          $ref: '#/components/schemas/StageDetail'

    StageDetail:
      type: object
      properties:
        status:
          type: string
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        duration:
          type: integer
        exitCode:
          type: integer

    # 日志条目
    LogEntry:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        level:
          type: string
          enum: [DEBUG, INFO, WARN, ERROR]
        message:
          type: string

    # 指标
    Metric:
      type: object
      properties:
        id:
          type: integer
          format: int64
        taskId:
          type: integer
          format: int64
        serverId:
          type: integer
          format: int64
        timestamp:
          type: string
          format: date-time
        metricType:
          type: string
        metricName:
          type: string
        value:
          type: number
        unit:
          type: string
        tags:
          type: object
          additionalProperties: true

    # 报告
    Report:
      type: object
      properties:
        id:
          type: integer
          format: int64
        taskId:
          type: integer
          format: int64
        taskName:
          type: string
        title:
          type: string
        summary:
          type: string
        conclusion:
          type: string
          enum: [pass, fail, warning]
        fileFormat:
          type: string
        createdAt:
          type: string
          format: date-time

    ReportDetail:
      type: object
      allOf:
        - $ref: '#/components/schemas/Report'
        - type: object
          properties:
            reportData:
              type: object
              additionalProperties: true

    ReportComparison:
      type: object
      properties:
        reportIds:
          type: array
          items:
            type: integer
            format: int64
        comparisons:
          type: array
          items:
            type: object
            properties:
              metric:
                type: string
              values:
                type: array
                items:
                  type: number
              changeRates:
                type: array
                items:
                  type: string

    # 测试结果
    TestResult:
      type: object
      properties:
        id:
          type: integer
          format: int64
        taskId:
          type: integer
          format: int64
        taskName:
          type: string
        serverId:
          type: integer
          format: int64
        serverName:
          type: string
        result:
          type: string
          enum: [pass, fail, warning, error]
        overallScore:
          type: integer
          minimum: 0
          maximum: 100
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    TestResultDetail:
      type: object
      allOf:
        - $ref: '#/components/schemas/TestResult'
        - type: object
          properties:
            resultReason:
              type: string
            metrics:
              type: object
              additionalProperties: true
            rawOutput:
              type: string
            rawError:
              type: string
            outputFiles:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  name:
                    type: string
                  size:
                    type: integer
            exitCode:
              type: integer
            durationMs:
              type: integer

    ResultComparison:
      type: object
      properties:
        compareType:
          type: string
          enum: [time, server, parameter, version]
        dimensions:
          type: array
          items:
            type: string
        metrics:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              displayName:
                type: string
              unit:
                type: string
              values:
                type: array
                items:
                  type: number
              changeRates:
                type: array
                items:
                  type: string
              trend:
                type: string
                enum: [increasing, decreasing, stable]

    TrendAnalysis:
      type: object
      properties:
        metric:
          type: object
          properties:
            name:
              type: string
            displayName:
              type: string
            unit:
              type: string
        period:
          type: string
        dataPoints:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              value:
                type: number
              taskId:
                type: integer
                format: int64
        statistics:
          type: object
          properties:
            min:
              type: number
            max:
              type: number
            avg:
              type: number
            stddev:
              type: number
        trend:
          type: object
          properties:
            direction:
              type: string
              enum: [increasing, decreasing, stable]
            changeRate:
              type: number
        anomalies:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              value:
                type: number
              expected:
                type: number
              deviation:
                type: number

    # 指标定义
    MetricDefinition:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        displayName:
          type: string
        category:
          type: string
        unit:
          type: string
        description:
          type: string
        baselineConfig:
          type: object
          additionalProperties: true
        comparisonMode:
          type: string
          enum: [higher_better, lower_better]
        applicableCategories:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    MetricDefinitionCreate:
      type: object
      required:
        - name
        - displayName
        - category
      properties:
        name:
          type: string
          maxLength: 100
        displayName:
          type: string
          maxLength: 200
        category:
          type: string
        unit:
          type: string
          maxLength: 50
        description:
          type: string
        baselineConfig:
          type: object
          additionalProperties: true
        comparisonMode:
          type: string
          enum: [higher_better, lower_better]
          default: higher_better
        applicableCategories:
          type: array
          items:
            type: string

    # 结果判定规则
    ResultRule:
      type: object
      properties:
        id:
          type: integer
          format: int64
        scriptId:
          type: integer
          format: int64
        scriptName:
          type: string
        name:
          type: string
        description:
          type: string
        rules:
          type: object
          additionalProperties: true
        priority:
          type: integer
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ResultRuleCreate:
      type: object
      required:
        - name
        - rules
      properties:
        scriptId:
          type: integer
          format: int64
        name:
          type: string
          maxLength: 100
        description:
          type: string
        rules:
          type: object
          additionalProperties: true
        priority:
          type: integer
          default: 0
        enabled:
          type: boolean
          default: true
